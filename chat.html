<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat con Negocio360</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
:root {
  --bg-base:        #f5f5f7;
  --bg-surface:     #ffffff;
  --bg-surface-2:   #fafafa;
  --bg-hover:       #f0f0f5;
  --text-primary:   #0d0d14;
  --text-secondary: #60607a;
  --text-muted:     #9999b3;
  --border:         #e8e8ef;
  --accent:         #5a5af4;
  --accent-soft:    #eff0ff;
  --accent-2:       #22c55e;
  --danger:         #ef4444;
  --danger-soft:    #fef2f2;
  --shadow-sm:      0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:      0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg-base:        #0c0c14;
  --bg-surface:     #13131f;
  --bg-surface-2:   #1a1a2a;
  --bg-hover:       #1e1e30;
  --text-primary:   #f0f0fa;
  --text-secondary: #9090b0;
  --text-muted:     #5a5a7a;
  --border:         #1e1e30;
  --accent:         #7b7bff;
  --accent-soft:    #1e1e40;
  --accent-2:       #4ade80;
  --danger:         #f87171;
  --danger-soft:    #2a0f0f;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-main); background:var(--bg-base); color:var(--text-primary);
  height:100vh; overflow:hidden; transition:background var(--transition),color var(--transition);
}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;}
#app{display:flex; flex-direction:column; height:100vh;}

/* HEADER */
#header{
  height:64px; flex-shrink:0; display:flex; align-items:center; gap:12px; padding:0 20px;
  background:var(--bg-surface); border-bottom:1px solid var(--border); z-index:10;
}
.back-btn{
  display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius-sm);
  border:1px solid var(--border); font-size:13px; font-weight:600; color:var(--text-secondary);
  transition:all var(--transition); background:var(--bg-surface);
}
.back-btn:hover{border-color:var(--accent); color:var(--accent);}
.header-title{display:flex; align-items:center; gap:10px; font-weight:800; font-size:16px;}
.header-title .dot{width:9px;height:9px;border-radius:50%;background:var(--accent-2);}
.header-spacer{flex:1;}
.theme-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:8px;
  color:var(--text-secondary); transition:all var(--transition);
}
.theme-btn:hover{background:var(--bg-hover); color:var(--text-primary);}

/* MAIN */
#main{flex:1; min-height:0; display:flex; flex-direction:column; max-width:760px; width:100%; margin:0 auto; padding:16px; gap:12px;}

/* HERO (sin conversación) */
#hero{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:24px;
}
#hero .hero-icon{
  width:72px;height:72px;border-radius:20px;background:var(--accent-soft); color:var(--accent);
  display:flex;align-items:center;justify-content:center;
}
#hero h1{font-size:20px; font-weight:800;}
#hero p{font-size:13.5px; color:var(--text-secondary); max-width:340px;}
#btn-start{
  margin-top:6px; padding:14px 28px; background:var(--accent); color:#fff; border-radius:var(--radius-sm);
  font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-md);
  transition:opacity var(--transition);
}
#btn-start:hover{opacity:.9;}

/* CHAT VIEW */
#chat-view{flex:1; min-height:0; display:none; flex-direction:column; gap:12px;}
#chat-view.active{display:flex;}

#messages{
  flex:1; min-height:0; overflow-y:auto; background:var(--bg-surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:16px; display:flex; flex-direction:column; gap:10px;
}
.msg-row{display:flex; max-width:80%;}
.msg-row.cliente{align-self:flex-end; justify-content:flex-end;}
.msg-row.admin{align-self:flex-start;}
.msg-bubble{
  padding:10px 14px; border-radius:14px; font-size:13.5px; line-height:1.45; word-wrap:break-word;
}
.msg-row.cliente .msg-bubble{background:var(--accent); color:#fff; border-bottom-right-radius:4px;}
.msg-row.admin .msg-bubble{background:var(--bg-surface-2); border:1px solid var(--border); border-bottom-left-radius:4px;}
.msg-time{font-size:10px; color:var(--text-muted); margin-top:3px;}
.msg-row.cliente .msg-time{text-align:right;}
.msg-bubble img{max-width:220px; border-radius:8px; display:block; margin-top:2px;}
.msg-bubble .doc-link{display:flex; align-items:center; gap:8px; font-weight:600; text-decoration:underline;}
.msg-bubble audio{margin-top:4px; max-width:220px;}

/* Banner finalizada */
#banner-finalizada{
  display:none; align-items:center; gap:10px; background:var(--danger-soft); color:var(--danger);
  border:1px solid var(--danger); border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; font-weight:600;
}
#banner-finalizada button{
  margin-left:auto; background:var(--danger); color:#fff; padding:8px 14px; border-radius:8px; font-size:12.5px; font-weight:700;
  flex-shrink:0;
}

/* INPUT BAR */
#input-bar{
  display:flex; align-items:flex-end; gap:8px; background:var(--bg-surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:10px; flex-shrink:0;
}
#input-bar.disabled{opacity:.5; pointer-events:none;}
.icon-btn{
  width:38px; height:38px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  border-radius:10px; color:var(--text-secondary); transition:all var(--transition);
}
.icon-btn:hover{background:var(--bg-hover); color:var(--accent);}
.icon-btn.recording{background:var(--danger-soft); color:var(--danger); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
#text-input{
  flex:1; border:none; outline:none; background:transparent; resize:none; font-family:inherit; font-size:13.5px;
  color:var(--text-primary); max-height:120px; padding:8px 4px; line-height:1.4;
}
#text-input::placeholder{color:var(--text-muted);}
#btn-send{
  width:40px; height:40px; flex-shrink:0; background:var(--accent); color:#fff; border-radius:10px;
  display:flex; align-items:center; justify-content:center; transition:opacity var(--transition);
}
#btn-send:hover{opacity:.85;}
#file-input{display:none;}

.hint{font-size:11px; color:var(--text-muted); text-align:center;}

/* Toast */
#toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
  background:var(--text-primary); color:var(--bg-surface); padding:10px 18px; border-radius:10px;
  font-size:12.5px; font-weight:600; transition:all .25s ease; z-index:999; pointer-events:none;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* Loader */
#loader{
  position:fixed; inset:0; background:var(--bg-base); z-index:1000; display:flex; align-items:center;
  justify-content:center; flex-direction:column; gap:14px; transition:opacity .3s;
}
#loader.hidden{opacity:0; pointer-events:none;}
.spinner{width:24px;height:24px;border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media (max-width:600px){
  #main{padding:10px;}
  .msg-row{max-width:90%;}
  #header{padding:0 12px;}
  .back-btn span{display:none;}
}
</style>

</head>
<body>

<div id="loader"><div class="spinner"></div><p style="font-size:13px;color:var(--text-muted)">Cargando chat…</p></div>

<div id="app" style="display:none">
  <header id="header">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span>Regresar al Dashboard</span>
    </button>
    <div class="header-spacer"></div>
    <div class="header-title"><span class="dot"></span>Chat con Negocio360</div>
    <div class="header-spacer"></div>
    <button class="theme-btn" onclick="toggleTheme()" title="Cambiar tema">
      <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <div id="main">

    <div id="hero">
      <div class="hero-icon">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h1>¿Necesitas ayuda?</h1>
      <p>Inicia un chat con nuestro equipo de soporte. Podrás enviar mensajes, imágenes, documentos y audios.</p>
      <button id="btn-start" onclick="startConversation()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Iniciar chat
      </button>
    </div>

    <div id="chat-view">
      <div id="messages"></div>

      <div id="banner-finalizada">
        <span>Esta conversación fue finalizada por el equipo de soporte.</span>
        <button onclick="startConversation()">Iniciar nueva conversación</button>
      </div>

      <div id="input-bar">
        <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt" />
        <button class="icon-btn" id="btn-attach" title="Adjuntar archivo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="icon-btn" id="btn-mic" title="Grabar audio">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <textarea id="text-input" rows="1" placeholder="Escribe un mensaje..."></textarea>
        <button id="btn-send" title="Enviar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hint">Puedes enviar texto, imágenes, documentos o notas de voz.</div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://zvlincmqmmoclqhykejv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RY59EmL8V2zRkOQg7RUJAw_dw6yr69t';
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUserId   = null;
let currentConv     = null;   // fila de conversaciones_chat
let msgChannel      = null;
let convChannel     = null;
let seenIds         = new Set();
let mediaRecorder   = null;
let audioChunks     = [];
let isRecording     = false;

/* ---------- THEME ---------- */
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('n360_theme', theme);
  document.getElementById('icon-sun').style.display  = theme==='dark' ? 'block':'none';
  document.getElementById('icon-moon').style.display = theme==='light'? 'block':'none';
}
function toggleTheme(){
  const curr = document.documentElement.getAttribute('data-theme');
  applyTheme(curr==='dark' ? 'light':'dark');
}

/* ---------- HELPERS ---------- */
function escHtml(str){
  if (str===null || str===undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function fmtTime(iso){
  try { return new Date(iso).toLocaleTimeString('es-NI', {hour:'2-digit',minute:'2-digit'}); }
  catch { return ''; }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2600);
}
function scrollToBottom(){
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

/* ---------- RENDER ---------- */
function renderMessage(m){
  if (seenIds.has(m.id)) return;
  seenIds.add(m.id);

  const row = document.createElement('div');
  row.className = 'msg-row ' + m.remitente;

  let inner = '';
  if (m.tipo === 'texto') {
    inner = `<div>${escHtml(m.contenido).replace(/\n/g,'<br>')}</div>`;
  } else if (m.tipo === 'imagen') {
    inner = `<img src="${m.archivo_url}" alt="imagen" onclick="window.open('${m.archivo_url}','_blank')">`;
  } else if (m.tipo === 'documento') {
    inner = `<a class="doc-link" href="${m.archivo_url}" target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      ${escHtml(m.archivo_nombre || 'Documento')}
    </a>`;
  } else if (m.tipo === 'audio') {
    inner = `<audio controls src="${m.archivo_url}"></audio>`;
  }

  row.innerHTML = `<div><div class="msg-bubble">${inner}</div><div class="msg-time">${fmtTime(m.created_at)}</div></div>`;
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
}

/* ---------- VIEW STATE ---------- */
function showHero(){
  document.getElementById('hero').style.display = 'flex';
  document.getElementById('chat-view').classList.remove('active');
}
function showChat(){
  document.getElementById('hero').style.display = 'none';
  document.getElementById('chat-view').classList.add('active');
}
function setInputEnabled(enabled){
  document.getElementById('input-bar').classList.toggle('disabled', !enabled);
  document.getElementById('banner-finalizada').style.display = enabled ? 'none' : 'flex';
}

/* ---------- LOAD LATEST CONVERSATION ---------- */
async function loadLatest(){
  const { data, error } = await sbClient
    .from('conversaciones_chat')
    .select('*')
    .eq('auth_user_id', currentUserId)
    .order('created_at', { ascending:false })
    .limit(1)
    .maybeSingle();

  if (error) { console.warn(error); showHero(); return; }

  if (!data) { showHero(); return; }

  currentConv = data;
  showChat();
  seenIds = new Set();
  document.getElementById('messages').innerHTML = '';
  await loadMessages();
  setInputEnabled(currentConv.estado === 'activa');
  subscribeRealtime();
}

async function loadMessages(){
  const { data, error } = await sbClient
    .from('mensajes_chat')
    .select('*')
    .eq('conversacion_id', currentConv.id)
    .order('created_at', { ascending:true });
  if (error) { console.warn(error); return; }
  (data||[]).forEach(renderMessage);
}

/* ---------- START CONVERSATION ---------- */
async function startConversation(){
  unsubscribeRealtime();
  document.getElementById('messages').innerHTML = '';
  seenIds = new Set();

  try {
    const { data: conv, error: errConv } = await sbClient
      .from('conversaciones_chat')
      .insert({ auth_user_id: currentUserId, estado: 'activa' })
      .select()
      .single();
    if (errConv) throw errConv;

    currentConv = conv;
    showChat();
    setInputEnabled(true);

    const { data: msg, error: errMsg } = await sbClient
      .from('mensajes_chat')
      .insert({
        conversacion_id: conv.id,
        auth_user_id: currentUserId,
        remitente: 'cliente',
        tipo: 'texto',
        contenido: 'hola'
      })
      .select()
      .single();
    if (errMsg) throw errMsg;

    renderMessage(msg);
    subscribeRealtime();

  } catch (e) {
    console.error(e);
    showToast('No se pudo iniciar el chat. Intenta de nuevo.');
  }
}

/* ---------- SEND TEXT ---------- */
async function sendText(){
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text || !currentConv || currentConv.estado !== 'activa') return;
  input.value = '';
  autoGrow(input);

  try {
    const { data, error } = await sbClient
      .from('mensajes_chat')
      .insert({
        conversacion_id: currentConv.id,
        auth_user_id: currentUserId,
        remitente: 'cliente',
        tipo: 'texto',
        contenido: text
      })
      .select()
      .single();
    if (error) throw error;
    renderMessage(data);
  } catch (e) {
    console.error(e);
    showToast('No se pudo enviar el mensaje.');
  }
}

/* ---------- ATTACH FILE ---------- */
async function attachFile(file){
  if (!currentConv || currentConv.estado !== 'activa') return;
  const tipo = file.type.startsWith('image/') ? 'imagen' : 'documento';
  const path = `${currentUserId}/${currentConv.id}/${Date.now()}-${file.name}`.replace(/\s+/g,'_');

  showToast('Subiendo archivo...');
  try {
    const { error: upErr } = await sbClient.storage.from('chat-archivos').upload(path, file);
    if (upErr) throw upErr;
    const { data: pub } = sbClient.storage.from('chat-archivos').getPublicUrl(path);

    const { data, error } = await sbClient
      .from('mensajes_chat')
      .insert({
        conversacion_id: currentConv.id,
        auth_user_id: currentUserId,
        remitente: 'cliente',
        tipo,
        archivo_url: pub.publicUrl,
        archivo_nombre: file.name
      })
      .select()
      .single();
    if (error) throw error;
    renderMessage(data);
  } catch (e) {
    console.error(e);
    showToast('No se pudo subir el archivo.');
  }
}

/* ---------- AUDIO RECORDING ---------- */
async function toggleRecording(){
  if (!currentConv || currentConv.estado !== 'activa') return;
  if (isRecording) { mediaRecorder.stop(); return; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('btn-mic').classList.remove('recording');
      isRecording = false;
      const blob = new Blob(audioChunks, { type:'audio/webm' });
      await uploadAudio(blob);
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('btn-mic').classList.add('recording');
    showToast('Grabando... presiona de nuevo para enviar');
  } catch (e) {
    console.error(e);
    showToast('No se pudo acceder al micrófono.');
  }
}

async function uploadAudio(blob){
  const path = `${currentUserId}/${currentConv.id}/${Date.now()}-nota-voz.webm`;
  try {
    const { error: upErr } = await sbClient.storage.from('chat-archivos').upload(path, blob, { contentType:'audio/webm' });
    if (upErr) throw upErr;
    const { data: pub } = sbClient.storage.from('chat-archivos').getPublicUrl(path);

    const { data, error } = await sbClient
      .from('mensajes_chat')
      .insert({
        conversacion_id: currentConv.id,
        auth_user_id: currentUserId,
        remitente: 'cliente',
        tipo: 'audio',
        archivo_url: pub.publicUrl,
        archivo_nombre: 'Nota de voz'
      })
      .select()
      .single();
    if (error) throw error;
    renderMessage(data);
  } catch (e) {
    console.error(e);
    showToast('No se pudo enviar el audio.');
  }
}

/* ---------- REALTIME ---------- */
function subscribeRealtime(){
  unsubscribeRealtime();

  msgChannel = sbClient.channel('msgs-'+currentConv.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'mensajes_chat', filter:`conversacion_id=eq.${currentConv.id}` },
      payload => renderMessage(payload.new))
    .subscribe();

  convChannel = sbClient.channel('conv-'+currentConv.id)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'conversaciones_chat', filter:`id=eq.${currentConv.id}` },
      payload => {
        currentConv = payload.new;
        if (currentConv.estado === 'finalizada') {
          setInputEnabled(false);
          showToast('El equipo de soporte finalizó esta conversación.');
        }
      })
    .subscribe();
}
function unsubscribeRealtime(){
  if (msgChannel) sbClient.removeChannel(msgChannel);
  if (convChannel) sbClient.removeChannel(convChannel);
  msgChannel = null; convChannel = null;
}

/* ---------- TEXTAREA AUTOGROW ---------- */
function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

/* ---------- INIT ---------- */
async function init(){
  const savedTheme = localStorage.getItem('n360_theme') || 'light';
  applyTheme(savedTheme);

  try {
    const { data: { user }, error } = await sbClient.auth.getUser();
    if (error || !user) { window.location.href = 'login.html'; return; }
    currentUserId = user.id;

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';

    await loadLatest();

  } catch (e) {
    console.error(e);
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    showHero();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  init();

  document.getElementById('btn-send').addEventListener('click', sendText);
  document.getElementById('text-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
  document.getElementById('text-input').addEventListener('input', e => autoGrow(e.target));

  document.getElementById('btn-attach').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) attachFile(file);
    e.target.value = '';
  });

  document.getElementById('btn-mic').addEventListener('click', toggleRecording);
});

sbClient.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') window.location.href = 'login.html';
});
</script>
<script src="perfiles-guard.js"></script>
</body>
