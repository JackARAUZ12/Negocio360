<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — Negocio360</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0B0F19;
    --card: #121826;
    --border: rgba(255,255,255,0.07);
    --text: #F0F4FF;
    --muted: #8892A4;
    --accent: #3B82F6;
    --accent-glow: rgba(59,130,246,0.25);
    --white: #fff;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
    bottom: -80px; right: -80px;
    pointer-events: none;
  }

  .logo-link { text-decoration: none; display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .logo-text { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
    animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
  .card-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.02em; }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  input::placeholder { color: rgba(136,146,164,0.5); }

  .forgot { display: flex; justify-content: flex-end; margin-top: -12px; margin-bottom: 20px; }
  .forgot a { font-size: 12px; color: var(--accent); text-decoration: none; }
  .forgot a:hover { text-decoration: underline; }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: -0.2px;
    box-shadow: 0 4px 20px rgba(59,130,246,0.35);
  }
  .btn-primary:hover { opacity: 0.9; box-shadow: 0 6px 28px rgba(59,130,246,0.45); }
  .btn-primary:active { transform: scale(0.98); }

  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 12px; color: var(--muted); }

  .signup-link { text-align: center; font-size: 14px; color: var(--muted); }
  .signup-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .signup-link a:hover { text-decoration: underline; }

  .back-home { margin-top: 24px; font-size: 13px; color: var(--muted); text-align: center; }
  .back-home a { color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .back-home a:hover { color: var(--text); }

  .pass-wrapper { position: relative; }
  .toggle-pass {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 16px; padding: 0;
  }
</style>
</head>
<body>
  <a href="index.html" class="logo-link">
    <div class="logo-icon">N</div>
    <span class="logo-text">Negocio360</span>
  </a>

  <div class="card">
    <div class="card-title">Bienvenido de vuelta</div>
    <div class="card-sub">Inicia sesión en tu cuenta de Negocio360</div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" placeholder="tu@empresa.com">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="pass-wrapper">
        <input type="password" id="pass" placeholder="••••••••">
        <button class="toggle-pass" onclick="togglePass()" type="button">👁</button>
      </div>
    </div>

    <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>

    <button class="btn-primary">Iniciar Sesión</button>

    <div class="divider"><span>o</span></div>

    <div class="signup-link">
      ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
    </div>
  </div>

  <div class="back-home">
    <a href="index.html">← Volver al inicio</a>
  </div>

  <script>
    function togglePass() {
      const p = document.getElementById('pass');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
